name: Build NAC API (patched)

# Builds the custom bluecords/api image from this fork.
# The root Dockerfile compiles the Rust workspace (where NAC patches live,
# e.g. the LiveKit token TTL fix); crates/delta/Dockerfile bundles the
# resulting binary into distroless and we push it to ghcr.io/bluecords/api.
#
# Runs on a standard GitHub runner (the upstream workflow needs a self-hosted
# arc-runner-set the fork doesn't have). Single-arch amd64 (matches the Linode).

on:
  workflow_dispatch:
  push:
    branches:
      - nac/voice-ttl-fix
    paths:
      - 'crates/**'
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/nac-api-build.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Add swap space (Rust link steps are memory-heavy)
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image (compiles Rust workspace incl. NAC patches)
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg TARGETARCH=amd64 \
            -t ghcr.io/stoatchat/base:latest \
            -f Dockerfile .

      - name: Build & push API image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ghcr.io/bluecords/api:voice-ttl-fix \
            -t ghcr.io/bluecords/api:${GITHUB_SHA} \
            -f crates/delta/Dockerfile .
          docker push ghcr.io/bluecords/api:voice-ttl-fix
          docker push ghcr.io/bluecords/api:${GITHUB_SHA}
          echo "Pushed ghcr.io/bluecords/api:voice-ttl-fix and :${GITHUB_SHA}"
